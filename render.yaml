# render.yaml
services:
  - type: web
    name: orbit-form
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.4

databases:
  - name: orbit-db
    databaseName: orbit
    user: orbit
