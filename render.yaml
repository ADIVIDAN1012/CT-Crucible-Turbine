services:
  - type: web
    name: project-orbit
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: project-orbit-db
      mountPath: /tmp
      sizeGB: 1
